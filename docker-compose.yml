version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: backfindr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: backfindr
      POSTGRES_PASSWORD: backfindr_dev_pass
      POSTGRES_DB: backfindr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backfindr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backfindr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backfindr_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://backfindr:backfindr_dev_pass@db:5432/backfindr
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: backfindr_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: ./web/.env.local
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
