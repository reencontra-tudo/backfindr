services:
  - type: web
    name: backfindr-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: service
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
